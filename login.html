<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Staff Management</title>
    <link rel="stylesheet" href="styles.css"> 
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 30px 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            width: 350px; 
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; 
        }


        h2 {
            margin-bottom: 20px;
            color: #28a745;
            margin-left: 240px;
        }

        input {
            width: 45%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-left: 100px;
        }

        button {
            width: 30%;
            padding: 12px;
            background: #28a745;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 15px;
            margin-left: 160px;
        }

        button:hover {
            background: #218838;
        }

        .error {
            color: red;
            margin-top: 10px;
        }

    </style>
</head>
<body>
    <div class="login-form">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button id="login-btn">Login</button>
        <p class="error" id="error-msg"></p>
    </div>
    <style>
                
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
            margin: 0;
        }

        
        .login-form {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            width: 320px;
            text-align: center;
            height: 50%;
        }

        /* Styling the login title */
        .login-form h2 {
            margin-bottom: 20px;
            color: #28a745;
            font-size: 24px;
            margin-left: 10px;
        }

        /* Input field styling */
        .login-form input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            background: #f9f9f9;
        }

        
        #login-btn {
            width: 40%;
            padding: 12px;
            background: #28a745;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.3s ease;
            margin-left: 100px;
        }

        #login-btn:hover {
            background: #218838;
        }

        
        .error {
            color: red;
            margin-top: 10px;
            font-size: 14px;
        }

    </style>
    <script>
        document.getElementById("login-btn").addEventListener("click", function() {
            let username = document.getElementById("username").value;
            let password = document.getElementById("password").value;

            if (username === "" || password === "") {
                document.getElementById("error-msg").innerText = "Please fill in all fields.";
                return;
            }

            fetch("http://localhost/staff_management_system/login.php", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === "success") {
                    window.location.href = "index.html"; 
                } else {
                    document.getElementById("error-msg").innerText = data.message;
                }
            })
            .catch(error => {
                document.getElementById("error-msg").innerText = "Server error. Try again later.";
            });
        });
    </script>
</body>
</html>
